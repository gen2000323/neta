<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
<meta charset="UTF-8">
<title>ゾンビ選別ゲーム</title>

<style>
body {
  background: #111;
  color: white;
  text-align: center;
  font-family: sans-serif;
  margin: 0;
}

.container {
  width: 90%;
  margin: 30px auto;
}

input {
  padding: 10px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
  width: 220px;
}

button {
  margin-top: 15px;
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #e63946;
  color: white;
  font-size: 16px;
}

.hidden {
  display: none !important;
}

#message {
  margin: 20px auto;
  padding: 15px;
  width: 80%;
  background: #1c1c1c;
  border-radius: 10px;
  min-height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.characters {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 30px;
  flex-wrap: wrap;
}

.character {
  width: 120px;
  height: 180px;
  background: #2b2b2b;
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: 0.2s;
}

.character:hover {
  transform: scale(1.05);
}

.face {
  font-size: 40px;
}

.body {
  font-size: 30px;
  margin-top: 8px;
}

.safe {
  background: #1f6f3d !important;
}

.danger {
  background: #8b1e1e !important;
}

.result-box {
  width: 320px;
  margin: 20px auto;
  padding: 15px;
  background: #1c1c1c;
  border-radius: 10px;
  text-align: left;
}

.result-item {
  padding: 6px 0;
  border-bottom: 1px solid #333;
}

/* 共通オーバーレイ */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.95);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s;
}

.overlay.show {
  opacity: 1;
  pointer-events: auto;
}

.overlay-content {
  text-align: center;
  width: 90%;
  max-width: 900px;
}

.overlay-title {
  font-size: 78px;
  font-weight: bold;
  letter-spacing: 8px;
  margin-bottom: 20px;
}

.overlay-sub {
  margin-top: 16px;
  font-size: 18px;
  color: #ddd;
}

.overlay-buttons {
  margin-top: 35px;
}

.overlay-buttons button {
  margin: 10px;
  font-size: 18px;
}

.overlay-image {
  width: 320px;
  max-width: 80vw;
  border-radius: 16px;
  box-shadow: 0 0 30px rgba(255,255,255,0.15);
  margin-top: 20px;
}

/* YOU DIED */
#gameOverText {
  color: red;
  text-shadow: 0 0 20px red;
}

/* CLEAR */
#clearText {
  color: #4dff88;
  text-shadow: 0 0 20px #4dff88;
}

/* フラッシュ */
.flash-white {
  animation: whiteFlash 0.22s linear 3;
}

@keyframes whiteFlash {
  0%   { background: rgba(0,0,0,0.95); }
  50%  { background: rgba(255,255,255,0.95); }
  100% { background: rgba(0,0,0,0.95); }
}
</style>
</head>

<body>

<div class="container">

  <!-- タイトル画面 -->
  <div id="titleScreen">
    <h1>ゾンビ選別ゲーム</h1>
    <p>名前を入力してゲーム開始</p>

    <input type="text" id="playerName" placeholder="プレイヤー名を入力">
    <br>
    <button onclick="startGame()">ゲーム開始</button>

    <div class="result-box">
      <h3>過去4ゲームの結果</h3>

      <div th:if="${#lists.isEmpty(results)}">まだ結果はありません</div>

      <div th:each="r : ${results}" class="result-item">
        <span th:text="${r.playerName}"></span>
        ：
        <span th:text="${r.result}"></span>
      </div>
    </div>
  </div>

  <!-- ゲーム画面 -->
  <div id="gameScreen" class="hidden">
    <h1>ゾンビ選別ゲーム</h1>
    <div id="stage">1 / 4</div>
    <div id="message">1人選べ。ゾンビなら終わり。</div>

    <div class="characters" id="characters"></div>

    <button id="nextBtn" class="hidden" onclick="nextStage()">次へ</button>
    <button id="restartBtn" class="hidden" onclick="goTitle()">タイトルへ戻る</button>
  </div>

</div>

<!-- YOU DIED -->
<div id="gameOverScreen" class="overlay" onclick="showGameOverOptions()">
  <div class="overlay-content">
    <div id="gameOverText" class="overlay-title">YOU DIED</div>
    <div class="overlay-sub">クリックで選択肢を表示</div>

    <div id="gameOverButtons" class="overlay-buttons hidden">
      <button onclick="restartGame(event)">リスタート</button>
      <button onclick="goTitle(event)">タイトルへ戻る</button>
    </div>
  </div>
</div>

<!-- CLEAR -->
<div id="clearScreen" class="overlay" onclick="showClearOptions()">
  <div class="overlay-content">
    <div id="clearText" class="overlay-title">CLEAR</div>
    <img src="/images/macho_good.png" alt="マッチョがいいねしている画像" class="overlay-image">
    <div class="overlay-sub">クリックで選択肢を表示</div>

    <div id="clearButtons" class="overlay-buttons hidden">
      <button onclick="restartGame(event)">もう一度遊ぶ</button>
      <button onclick="goTitle(event)">タイトルへ戻る</button>
    </div>
  </div>
</div>

<!-- レアバッドエンド演出 -->
<div id="rareBadScreen" class="overlay">
  <div class="overlay-content">
    <div id="rareBadText" class="overlay-title" style="color:#fff; text-shadow:0 0 20px #fff;">
      再会…
    </div>

    <img id="rareBadImage" src="/images/macho_good.png" alt="マッチョ画像" class="overlay-image">

    <div id="rareBadButtons" class="overlay-buttons hidden">
      <button onclick="restartGame(event)">リスタート</button>
      <button onclick="goTitle(event)">タイトルへ戻る</button>
    </div>
  </div>
</div>

<script>
let stage = 1;
let gameOver = false;

const faces = ["😀","😎","😐","😏","🥸","🤓"];
const bodies = ["🧥","👕","🧢","🎧","👔","🦺"];

function randomItem(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function startGame() {
  const name = document.getElementById("playerName").value.trim();

  if (name === "") {
    alert("名前入力して");
    return;
  }

  fetch("/start", {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: "playerName=" + encodeURIComponent(name)
  })
  .then(res => res.text())
  .then(() => {
    stage = 1;
    gameOver = false;

    document.getElementById("titleScreen").classList.add("hidden");
    document.getElementById("gameScreen").classList.remove("hidden");

    document.getElementById("stage").textContent = "1 / 4";
    document.getElementById("message").textContent = "1人選べ。ゾンビなら終わり。";
    document.getElementById("nextBtn").classList.add("hidden");
    document.getElementById("restartBtn").classList.add("hidden");

    hideAllOverlays();
    generateCharacters();
  });
}

function generateCharacters() {
  const container = document.getElementById("characters");
  container.innerHTML = "";

  for (let i = 0; i < 4; i++) {
    const div = document.createElement("div");
    div.className = "character";
    div.onclick = () => select(i);

    div.innerHTML = `
      <div class="face">${randomItem(faces)}</div>
      <div class="body">${randomItem(bodies)}</div>
    `;

    container.appendChild(div);
  }
}

function select(index) {
  if (gameOver) return;

  fetch("/select", {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: "index=" + index
  })
  .then(res => res.text())
  .then(result => {
    const chars = document.querySelectorAll(".character");

    if (result === "GAME_OVER") {
      chars[index].classList.add("danger");
      chars[index].innerHTML = "🧟";

      document.getElementById("gameOverScreen").classList.add("show");
      document.getElementById("gameOverButtons").classList.add("hidden");

      gameOver = true;
    }

    else if (result === "SAFE") {
      chars[index].classList.add("safe");
      document.getElementById("message").textContent = "セーフ…次へ";
      document.getElementById("nextBtn").classList.remove("hidden");
    }

    else if (result === "HAPPY") {
      gameOver = true;
      document.getElementById("message").textContent = "ハッピーエンド";
      document.getElementById("clearScreen").classList.add("show");
      document.getElementById("clearButtons").classList.add("hidden");
    }

    else if (result === "RARE_BAD") {
      gameOver = true;
      playRareBadEnding();
    }
  });
}

function nextStage() {
  stage++;
  document.getElementById("stage").textContent = stage + " / 4";
  document.getElementById("message").textContent = "1人選べ。ゾンビなら終わり。";
  document.getElementById("nextBtn").classList.add("hidden");
  generateCharacters();
}

function showGameOverOptions() {
  document.getElementById("gameOverButtons").classList.remove("hidden");
}

function showClearOptions() {
  document.getElementById("clearButtons").classList.remove("hidden");
}

function playRareBadEnding() {
  const screen = document.getElementById("rareBadScreen");
  const text = document.getElementById("rareBadText");
  const image = document.getElementById("rareBadImage");
  const buttons = document.getElementById("rareBadButtons");

  buttons.classList.add("hidden");
  screen.classList.add("show");
  text.textContent = "再会…";
  text.style.color = "#ffffff";
  text.style.textShadow = "0 0 20px #ffffff";
  image.src = "/images/macho_good.png";

  setTimeout(() => {
    screen.classList.add("flash-white");
  }, 300);

  setTimeout(() => {
    text.textContent = "まさか…";
  }, 1100);

  setTimeout(() => {
    image.src = "/images/macho_zombie.png";
    text.textContent = "YOU DIED";
    text.style.color = "red";
    text.style.textShadow = "0 0 20px red";
    screen.classList.remove("flash-white");
  }, 1800);

  setTimeout(() => {
    buttons.classList.remove("hidden");
  }, 2600);
}

function restartGame(event) {
  if (event) event.stopPropagation();

  fetch("/start", {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: "playerName=" + encodeURIComponent(document.getElementById("playerName").value || "名無し")
  })
  .then(res => res.text())
  .then(() => {
    stage = 1;
    gameOver = false;

    hideAllOverlays();

    document.getElementById("titleScreen").classList.add("hidden");
    document.getElementById("gameScreen").classList.remove("hidden");

    document.getElementById("stage").textContent = "1 / 4";
    document.getElementById("message").textContent = "1人選べ。ゾンビなら終わり。";
    document.getElementById("nextBtn").classList.add("hidden");
    document.getElementById("restartBtn").classList.add("hidden");

    generateCharacters();
  });
}

function goTitle(event) {
  if (event) event.stopPropagation();
  location.href = "/";
}

function hideAllOverlays() {
  document.getElementById("gameOverScreen").classList.remove("show");
  document.getElementById("clearScreen").classList.remove("show");
  document.getElementById("rareBadScreen").classList.remove("show");

  document.getElementById("gameOverButtons").classList.add("hidden");
  document.getElementById("clearButtons").classList.add("hidden");
  document.getElementById("rareBadButtons").classList.add("hidden");

  document.getElementById("rareBadScreen").classList.remove("flash-white");
}
</script>

</body>
</html>
